permissions_schedule_exact_permission_title=Allow exact execution
permissions_schedule_exact_permission_description=If you want to use a more accurate execution you have to grant the app a permission that allows RPout to schedule exact alarms.\n\
\n\
This permission is used to display the reminder to move more precisely.

permissions_batteryInformation_title=Battery optimization
permissions_batteryInformation_description=To precisely track your steps and displaying the reminder to move, RPout needs the permission to run in background. \n\
\n\
Therefore, please disable all energy saving options for this App.

permissions_drawOverlay_title=Draw over other apps
permissions_drawOverlay_description=To show the reminder to move over other apps, RPout requires this special permission.\n\
\n\
You can find this setting in "Extras".

permissions_unused_title=Revoke permission for unused app
permissions_unused_description=By default, the permissions of apps are revoked after some time if they have not been used.\n\
\n\
However, as the pedometer should continue to work in these cases, please deactivate this option.