permissions_schedule_exact_permission_title=Erlaube eine exakte Ausführung
permissions_schedule_exact_permission_description=Um RPout eine exakte Ausführung zu ermöglichen, muss du dieser App eine Berechtigung zur genauen Planung von Alarmen geben.\n\
\n\
Diese wird zur Ausführung der Bewegungs-Errinerungen verwendet.

permissions_batteryInformation_title=Akku-Optimierungen
permissions_batteryInformation_description=Um deine Schritte genau zu protokollieren und die Bewegungs-Errinerungen zu planen, muss RPout im Hintergrund tätig sein. \n\
\n\
Deshalb deaktiviere bitte alle Energiesparoptionen deines Gerätes für diese App.

permissions_drawOverlay_title=Über andere Apps einblenden
permissions_drawOverlay_description=Um die Bewegungs-Errinerung über andere Apps einblenden zu können, braucht RPout diese spezielle Berechtigung.\n\
\n\
Du kannst diese unter der Rubrik "Erweitert" finden.\
\n\
Je nach Gerät muss die Berechtigung eventuell über ADB erteilt werden.

permissions_unused_title=Berechtigung für ungenutzte App entfernen
permissions_unused_description=Standardmäßig werden die Berechtigungen von Apps nach einiger Zeit entzogen, wenn diese nicht genutzt wurde.\n\
\n\
Da der Schrittzähler aber auch in diesen Fällen weiter funktionieren soll, deaktiviere bitte diese Option.

