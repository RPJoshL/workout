{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include ".fullname" . }}
spec:
  parentRefs: {{ toYaml .Values.httpRoute.gatewayParentRefs | nindent 4 }}
  hostnames:
    - {{ .Values.httpRoute.virtualhost.fqdn }}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: {{ include ".fullname" . }}-rpout-service
          port: 4020
      timeouts:
        request: 90s

    - matches:
      - path:
          type: PathPrefix
          value: /api/v1/download
      backendRefs:
        - name: {{ include ".fullname" . }}-android-service
          port: 8090
      timeouts:
        request: 90s
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
{{- end }}