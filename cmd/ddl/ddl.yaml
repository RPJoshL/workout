# This file contains the configuration to create the database models for the app

genericOutputPath: './internal/models/'
packageName: 'models'
tableConfig:
  workout:
    includePointedStructs: true
  workout_tags:
    includeReferencedStructs: [ 'tag_id' ]
    path: './internal/models/workout.go'
  workout_details:
    path: './internal/models/workout.go'
  workout_type:
    path: './internal/models/workout.go'
  geonames_adm:
    path: './internal/models/geonames.go'
  v_geonames_all:
    path: './internal/models/geonames.go'
  pai_daily:
    path: './internal/models/pai.go'
  rule_tagging:
    includeReferencedStructs: [ 'start_location', 'end_location' ]
ignoreTables:
  - year_day
  - v_user_timezone
  - v_year_day_user_offset